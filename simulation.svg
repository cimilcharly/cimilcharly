<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="350">
  <defs>
    <!-- Glowing Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Background -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.2" fill="#1e293b" />
    </pattern>
  </defs>

  <style>
    .screen {
      fill: #0b0f19;
      stroke: #1e293b;
      stroke-width: 2;
    }

    .border-glow {
      stroke: #6366f1;
      stroke-width: 1.5;
      filter: url(#glow);
      opacity: 0.6;
    }

    .text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      fill: #94a3b8;
    }

    .header-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      fill: #e2e8f0;
      font-weight: bold;
    }

    /* Score value styling */
    .score-val {
      opacity: 0;
    }

    /* Snake Segment colors and sizes */
    .snake-head {
      fill: #10b981;
      filter: url(#glow);
    }

    .snake-body {
      fill: #059669;
    }

    .snake-tail {
      fill: #047857;
    }

    /* Milestone pins state toggling */
    .milestone-active { opacity: 1; }
    .milestone-eaten { opacity: 0; }

    /* CSS Keyframes for Timeline Events (10s Loop) */
    
    /* Segment Grow animations */
    .seg-3 { animation: grow-3 10s infinite steps(1); }
    .seg-4 { animation: grow-4 10s infinite steps(1); }
    .seg-5 { animation: grow-5 10s infinite steps(1); }
    .seg-6 { animation: grow-6 10s infinite steps(1); }

    @keyframes grow-3 {
      0%, 4.35% { opacity: 0; }
      4.36%, 100% { opacity: 1; }
    }
    @keyframes grow-4 {
      0%, 23.9% { opacity: 0; }
      23.91%, 100% { opacity: 1; }
    }
    @keyframes grow-5 {
      0%, 43.5% { opacity: 0; }
      43.51%, 100% { opacity: 1; }
    }
    @keyframes grow-6 {
      0%, 60.9% { opacity: 0; }
      60.91%, 100% { opacity: 1; }
    }

    /* Milestone active/eaten toggles */
    .m1-active { animation: boot-fade 10s infinite steps(1); }
    .m1-eaten  { animation: state1-to-end 10s infinite steps(1); }

    .m2-active { animation: m2-active-fade 10s infinite steps(1); }
    .m2-eaten  { animation: state2-to-end 10s infinite steps(1); }

    .m3-active { animation: m3-active-fade 10s infinite steps(1); }
    .m3-eaten  { animation: state3-to-end 10s infinite steps(1); }

    .m4-active { animation: m4-active-fade 10s infinite steps(1); }
    .m4-eaten  { animation: state4-to-end 10s infinite steps(1); }

    @keyframes boot-fade {
      0%, 4.35% { opacity: 1; }
      4.36%, 100% { opacity: 0; }
    }
    @keyframes state1-to-end {
      0%, 4.35% { opacity: 0; }
      4.36%, 100% { opacity: 1; }
    }
    @keyframes m2-active-fade {
      0%, 23.9% { opacity: 1; }
      23.91%, 100% { opacity: 0; }
    }
    @keyframes state2-to-end {
      0%, 23.9% { opacity: 0; }
      23.91%, 100% { opacity: 1; }
    }
    @keyframes m3-active-fade {
      0%, 43.5% { opacity: 1; }
      43.51%, 100% { opacity: 0; }
    }
    @keyframes state3-to-end {
      0%, 43.5% { opacity: 0; }
      43.51%, 100% { opacity: 1; }
    }
    @keyframes m4-active-fade {
      0%, 60.9% { opacity: 1; }
      60.91%, 100% { opacity: 0; }
    }
    @keyframes state4-to-end {
      0%, 60.9% { opacity: 0; }
      60.91%, 100% { opacity: 1; }
    }

    /* Terminal logs state toggling */
    .log-boot { animation: boot-fade 10s infinite steps(1); }
    .log-state-1 { animation: state1-fade 10s infinite steps(1); }
    .log-state-2 { animation: state2-fade 10s infinite steps(1); }
    .log-state-3 { animation: state3-fade 10s infinite steps(1); }
    .log-state-4 { animation: state4-fade 10s infinite steps(1); }

    .log-boot, .log-state-1, .log-state-2, .log-state-3, .log-state-4 {
      opacity: 0;
    }

    @keyframes state1-fade {
      0%, 4.35% { opacity: 0; }
      4.36%, 23.9% { opacity: 1; }
      23.91%, 100% { opacity: 0; }
    }
    @keyframes state2-fade {
      0%, 23.9% { opacity: 0; }
      23.91%, 43.5% { opacity: 1; }
      43.51%, 100% { opacity: 0; }
    }
    @keyframes state3-fade {
      0%, 43.5% { opacity: 0; }
      43.51%, 60.9% { opacity: 1; }
      60.91%, 100% { opacity: 0; }
    }
    @keyframes state4-fade {
      0%, 60.9% { opacity: 0; }
      60.91%, 100% { opacity: 1; }
    }

    /* Scores toggling classes matching state keyframes */
    .score-0 { animation: boot-fade 10s infinite steps(1); }
    .score-1 { animation: state1-fade 10s infinite steps(1); }
    .score-2 { animation: state2-fade 10s infinite steps(1); }
    .score-3 { animation: state3-fade 10s infinite steps(1); }
    .score-4 { animation: state4-fade 10s infinite steps(1); }

    .green-highlight {
      fill: #10b981;
      font-weight: bold;
      filter: url(#glow);
    }

    /* Status dot animation */
    .status-dot {
      fill: #10b981;
      animation: blink 1.5s infinite alternate;
      filter: url(#glow);
    }
    @keyframes blink {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>

  <!-- Screen Background -->
  <rect class="screen" width="600" height="350" rx="10" />
  <rect width="600" height="350" rx="10" fill="url(#grid)" />

  <!-- Top bar header -->
  <g transform="translate(20, 30)">
    <text class="header-text" x="0" y="0">🎮 SKILL ENGINE (SNAKE.EXE)</text>
    
    <!-- Scoreboard (Dynamically toggling opacities) -->
    <text class="text" x="310" y="0">SCORE: </text>
    <text class="text score-val score-0" x="360" y="0" style="fill: #38bdf8; font-weight: bold; filter: url(#glow);">0000</text>
    <text class="text score-val score-1" x="360" y="0" style="fill: #38bdf8; font-weight: bold; filter: url(#glow);">2450</text>
    <text class="text score-val score-2" x="360" y="0" style="fill: #38bdf8; font-weight: bold; filter: url(#glow);">5120</text>
    <text class="text score-val score-3" x="360" y="0" style="fill: #38bdf8; font-weight: bold; filter: url(#glow);">7890</text>
    <text class="text score-val score-4" x="360" y="0" style="fill: #38bdf8; font-weight: bold; filter: url(#glow);">9990</text>

    <text class="text" x="430" y="0">HI-SCORE: <tspan style="fill: #38bdf8; font-weight: bold; filter: url(#glow);">9990</tspan></text>
    
    <!-- Divider Line -->
    <line x1="0" y1="12" x2="560" y2="12" stroke="#1e293b" stroke-width="1.5" />
  </g>

  <!-- Left Panel: Grid Playfield Map -->
  <g transform="translate(15, 55)">
    <!-- Boundary Box -->
    <rect width="260" height="275" rx="6" fill="none" stroke="#1e293b" />
    <rect class="border-glow" width="260" height="275" rx="6" fill="none" />
    
    <!-- Faint Guide path for level navigation -->
    <path d="M 50,270 L 70,270 L 70,250 L 210,250 L 210,210 L 110,210 L 110,130 L 230,130 L 230,90 L 50,90 Z" fill="none" stroke="#1e293b" stroke-dasharray="3 3" stroke-width="1" />

    <!-- Milestone Pin 1 [1] at (70, 250) -->
    <g>
      <circle class="m1-active" cx="70" cy="250" r="10" fill="#38bdf8" filter="url(#glow)" />
      <text class="text m1-active" x="67" y="254" style="font-size: 11px; fill: #0b0f19; font-weight: bold;">1</text>
      
      <circle class="m1-eaten" cx="70" cy="250" r="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
      <path class="m1-eaten" d="M 65,250 L 69,254 L 75,246" fill="none" stroke="#10b981" stroke-width="2" />
    </g>

    <!-- Milestone Pin 2 [2] at (210, 210) -->
    <g>
      <circle class="m2-active" cx="210" cy="210" r="10" fill="#38bdf8" filter="url(#glow)" />
      <text class="text m2-active" x="207" y="214" style="font-size: 11px; fill: #0b0f19; font-weight: bold;">2</text>
      
      <circle class="m2-eaten" cx="210" cy="210" r="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
      <path class="m2-eaten" d="M 205,210 L 209,214 L 215,206" fill="none" stroke="#10b981" stroke-width="2" />
    </g>

    <!-- Milestone Pin 3 [3] at (110, 130) -->
    <g>
      <circle class="m3-active" cx="110" cy="130" r="10" fill="#38bdf8" filter="url(#glow)" />
      <text class="text m3-active" x="107" y="134" style="font-size: 11px; fill: #0b0f19; font-weight: bold;">3</text>
      
      <circle class="m3-eaten" cx="110" cy="130" r="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
      <path class="m3-eaten" d="M 105,130 L 109,134 L 115,126" fill="none" stroke="#10b981" stroke-width="2" />
    </g>

    <!-- Milestone Pin 4 [4] at (230, 90) -->
    <g>
      <circle class="m4-active" cx="230" cy="90" r="10" fill="#38bdf8" filter="url(#glow)" />
      <text class="text m4-active" x="227" y="94" style="font-size: 11px; fill: #0b0f19; font-weight: bold;">4</text>
      
      <circle class="m4-eaten" cx="230" cy="90" r="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" />
      <path class="m4-eaten" d="M 225,90 L 229,94 L 235,86" fill="none" stroke="#10b981" stroke-width="2" />
    </g>

    <!-- Snake Animation elements moving along path -->
    <!-- Segments trail head with negative delay (overlapping spacing) -->
    
    <!-- Tail Segments (grow dynamically) -->
    <circle class="snake-tail seg-6" cx="0" cy="0" r="5.5">
      <animateMotion dur="10s" repeatCount="indefinite" path="M 50,270 L 70,270 L 70,250 L 210,250 L 210,210 L 110,210 L 110,130 L 230,130 L 230,90 L 50,90 Z" begin="-0.978s" />
    </circle>

    <circle class="snake-body seg-5" cx="0" cy="0" r="5.5">
      <animateMotion dur="10s" repeatCount="indefinite" path="M 50,270 L 70,270 L 70,250 L 210,250 L 210,210 L 110,210 L 110,130 L 230,130 L 230,90 L 50,90 Z" begin="-0.815s" />
    </circle>

    <circle class="snake-body seg-4" cx="0" cy="0" r="5.5">
      <animateMotion dur="10s" repeatCount="indefinite" path="M 50,270 L 70,270 L 70,250 L 210,250 L 210,210 L 110,210 L 110,130 L 230,130 L 230,90 L 50,90 Z" begin="-0.652s" />
    </circle>

    <circle class="snake-body seg-3" cx="0" cy="0" r="6">
      <animateMotion dur="10s" repeatCount="indefinite" path="M 50,270 L 70,270 L 70,250 L 210,250 L 210,210 L 110,210 L 110,130 L 230,130 L 230,90 L 50,90 Z" begin="-0.489s" />
    </circle>

    <!-- Always active core elements -->
    <circle class="snake-body" cx="0" cy="0" r="6">
      <animateMotion dur="10s" repeatCount="indefinite" path="M 50,270 L 70,270 L 70,250 L 210,250 L 210,210 L 110,210 L 110,130 L 230,130 L 230,90 L 50,90 Z" begin="-0.326s" />
    </circle>

    <circle class="snake-body" cx="0" cy="0" r="6.5">
      <animateMotion dur="10s" repeatCount="indefinite" path="M 50,270 L 70,270 L 70,250 L 210,250 L 210,210 L 110,210 L 110,130 L 230,130 L 230,90 L 50,90 Z" begin="-0.163s" />
    </circle>

    <circle class="snake-head" cx="0" cy="0" r="7.5">
      <animateMotion dur="10s" repeatCount="indefinite" path="M 50,270 L 70,270 L 70,250 L 210,250 L 210,210 L 110,210 L 110,130 L 230,130 L 230,90 L 50,90 Z" begin="0s" />
    </circle>

    <!-- Map Labels -->
    <text class="text" x="10" y="295" style="font-size: 9px; fill: #475569;">START</text>
    <text class="text" x="220" y="315" style="font-size: 8px; fill: #334155;">[LEVEL 1]</text>
  </g>

  <!-- Right Panel: Skill Milestones Terminal Console -->
  <g transform="translate(290, 55)">
    <rect width="295" height="275" rx="6" fill="none" stroke="#1e293b" />
    <rect class="border-glow" width="295" height="275" rx="6" fill="none" />

    <!-- Terminal Background Box -->
    <rect x="5" y="5" width="285" height="265" rx="4" fill="#070a13" />

    <!-- Boot Log -->
    <g class="log-boot" transform="translate(15, 25)">
      <text class="text green-highlight" x="0" y="0">&gt; BOOTING SKILL_CORE...</text>
      <text class="text" x="0" y="25">&gt; LOADING TECH STACK DATA</text>
      <text class="text" x="0" y="50">&gt; INITIALIZING MAP SCAN</text>
      <text class="text" x="0" y="75">&gt; ACQUIRING TARGETS...</text>
    </g>

    <!-- Log 1: Languages -->
    <g class="log-state-1" transform="translate(15, 25)">
      <text class="text green-highlight" x="0" y="0">&gt; EATEN: LANGUAGES</text>
      <text class="text" x="0" y="25" style="fill: #38bdf8; font-weight: bold;">LANGUAGES &amp; SYNTAX</text>
      <text class="text" x="0" y="50">• Python, Java, C, Kotlin</text>
      <text class="text" x="0" y="70">• JavaScript &amp; TypeScript</text>
      <text class="text" x="0" y="90">• OOP Concepts &amp; Structures</text>
      <text class="text green-highlight" x="0" y="125" style="font-size: 10px;">[SCORE: +2450pts]</text>
    </g>

    <!-- Log 2: Backend & DB -->
    <g class="log-state-2" transform="translate(15, 25)">
      <text class="text green-highlight" x="0" y="0">&gt; EATEN: BACKEND CORE</text>
      <text class="text" x="0" y="25" style="fill: #38bdf8; font-weight: bold;">BACKEND &amp; DATABASES</text>
      <text class="text" x="0" y="50">• FastAPI &amp; Django Frameworks</text>
      <text class="text" x="0" y="70">• PostgreSQL, MongoDB, SQLite</text>
      <text class="text" x="0" y="90">• RESTful API Engineering</text>
      <text class="text green-highlight" x="0" y="125" style="font-size: 10px;">[SCORE: +2670pts]</text>
    </g>

    <!-- Log 3: AI & ML -->
    <g class="log-state-3" transform="translate(15, 25)">
      <text class="text green-highlight" x="0" y="0">&gt; EATEN: AI/ML ENGINE</text>
      <text class="text" x="0" y="25" style="fill: #38bdf8; font-weight: bold;">INTELLIGENCE ENGINE</text>
      <text class="text" x="0" y="50">• Machine Learning Workflows</text>
      <text class="text" x="0" y="70">• NLP &amp; Data Pipeline Design</text>
      <text class="text" x="0" y="90">• LLM Integrations (GPT-4)</text>
      <text class="text green-highlight" x="0" y="125" style="font-size: 10px;">[SCORE: +2770pts]</text>
    </g>

    <!-- Log 4: Cloud & Deployment -->
    <g class="log-state-4" transform="translate(15, 25)">
      <text class="text green-highlight" x="0" y="0">&gt; EATEN: DEPLOYMENT</text>
      <text class="text" x="0" y="25" style="fill: #38bdf8; font-weight: bold;">CLOUD &amp; DEPLOYMENT</text>
      <text class="text" x="0" y="50">• Docker Containerization</text>
      <text class="text" x="0" y="70">• Google Cloud Platform (GCP)</text>
      <text class="text" x="0" y="90">• Vercel Deployment &amp; Config</text>
      <text class="text green-highlight" x="0" y="125" style="font-size: 10px;">[SCORE: +2100pts | MAX SCORE!]</text>
    </g>
  </g>

  <!-- CRT Monitor Lens Screen glare effect -->
  <path d="M 10,10 Q 300,5 590,10" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08" />
</svg>
